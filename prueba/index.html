<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios TS</title>
</head>
<body>

  <h1>Ejercicios TypeScript</h1>

  <h2>1. Par o Impar</h2>
  <input id="num" type="number" placeholder="Número">
  <button onclick="parImpar()">Par o Impar</button>
  <p id="res1"></p>

  <h2>2. Caída Libre</h2>
  <input id="vel" type="number" placeholder="Velocidad inicial">
  <input id="acel" type="number" placeholder="Aceleración">
  <input id="dist" type="number" placeholder="Distancia">
  <button onclick="tiempo()">Calcular tiempo</button>
  <p id="res2"></p>

  <h2>3. Precio con IVA</h2>
  <input id="precio" type="number" placeholder="Precio juego">
  <button onclick="precioIVA()">Calcular IVA</button>
  <p id="res3"></p>

  <h2>4. MB a KB</h2>
  <input id="mb" type="number" placeholder="MB">
  <button onclick="convertir()">Convertir</button>
  <p id="res4"></p>

  <h2>5. Área cuadrado</h2>
  <input id="lado" type="number" placeholder="Lado cuadrado">
  <button onclick="areaCuadrado()">Calcular</button>
  <p id="res5"></p>

  <h2>6. Segundos del día</h2>
  <input id="hora" type="number" placeholder="Hora (0-23)">
  <button onclick="segundos()">Calcular segundos</button>
  <p id="res6"></p>

  <h2>7. Área triángulo</h2>
  <input id="cat1" type="number" placeholder="Cateto 1">
  <input id="cat2" type="number" placeholder="Cateto 2">
  <button onclick="areaTriangulo()">Calcular área</button>
  <p id="res7"></p>

  <script src="app.js"></script>
</body>
</html>
